<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine Flow | Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { obsidian: '#050505' } } } }
    </script>
    <style>
        body { background-color: #000000; color: #E5E7EB; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-panel { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-active { color: white !important; border-bottom: 2px solid white !important; }
        .tab-inactive { color: rgba(255,255,255,0.3) !important; border-bottom: 2px solid transparent !important; }
        .clock-font { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.05em; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .sync-active { animation: pulse 2s infinite; color: #4ade80; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="text-xl font-900 tracking-tighter text-white uppercase italic">ROUTINE<span class="text-white/70 not-italic">FLOW</span></h1>
            <nav class="flex space-x-6 font-black text-[10px] tracking-[0.3em]">
                <button id="nav-dashboard" onclick="switchTab('dashboard')" class="pb-1 tab-active uppercase">DASHBOARD</button>
                <button id="nav-insights" onclick="switchTab('insights')" class="pb-1 tab-inactive uppercase">ARCHITECT</button>
                <button id="nav-analytics" onclick="switchTab('analytics')" class="pb-1 tab-inactive uppercase">ANALYTICS</button>
            </nav>
        </div>
    </header>

    <main class="pt-24 max-w-7xl mx-auto min-h-screen">
        <section id="view-dashboard" class="p-6 flex flex-col items-center space-y-12">
            <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-center text-[12px] uppercase font-black">
                <div id="prev-activity" class="text-white/70">---</div>
                <div id="current-activity" class="text-white border border-white/10 px-4 py-1 rounded-full text-center">LOADING...</div>
                <div id="next-activity" class="text-white/70">---</div>
            </div>
            <div id="main-timer" class="clock-font text-[18vw] md:text-[10rem] font-bold text-white tracking-tighter leading-none py-10">00:00:00</div>
            <div class="flex flex-col md:flex-row items-center gap-4 w-full max-w-xl">
                <button onclick="handleCheckIn()" class="w-full md:flex-1 bg-white text-black py-5 rounded-2xl font-black text-[10px] uppercase">Check-In</button>
                <button id="btn-pause" onclick="handlePauseResume()" class="w-full md:flex-1 border border-white/10 text-white/60 py-5 rounded-2xl font-black text-[10px] uppercase">Pause</button>
                <button onclick="handleCheckOut()" class="w-full md:flex-1 border border-white/10 text-white/40 py-5 rounded-2xl font-black text-[10px] uppercase">Check-Out</button>
            </div>
        </section>

        <section id="view-insights" class="hidden h-[calc(100vh-120px)] p-6">
            <div class="flex flex-col h-full bg-white/5 rounded-3xl p-6 relative">
                <div id="chat-window" class="flex-1 overflow-y-auto space-y-4 pb-20"></div>
                <div class="absolute bottom-6 left-6 right-6">
                    <input id="chat-input" type="text" onkeypress="if(event.key==='Enter')sendMessage()" placeholder="Consult Architect..." class="w-full bg-white/5 border border-white/10 rounded-2xl p-5 text-sm outline-none">
                </div>
            </div>
        </section>

        <section id="view-analytics" class="hidden p-6 text-center pt-20">
            <h2 class="text-xl font-black uppercase opacity-20 tracking-widest">Analytics Online</h2>
            <p class="text-xs mt-4 opacity-10">Historical data syncing...</p>
        </section>
    </main>

    <script>
        const API = "https://routine-backend-7yn2.onrender.com";
        let App = { state: 'READY', seconds: 0, total: 0, activity: null, acc: 0 };

        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            setInterval(() => {
                document.getElementById('sync-indicator')?.innerText = ""; 
            }, 5000);
            appendBubble('ai', "Memory initialized. Architect Engine V5.6.6 online. How can I help you today, Sriniket?");
        });

        async function fetchData() {
            try {
                const res = await fetch(`${API}/get_dashboard`);
                const d = await res.json();
                
                if (d.status === "success") {
                    App.activity = d.cur;
                    document.getElementById('current-activity').innerText = d.cur.Activity;
                    document.getElementById('prev-activity').innerText = d.prev.Activity;
                    document.getElementById('next-activity').innerText = d.next.Activity;
                    App.total = Math.round((parseFloat(d.cur.Duration) || 1) * 3600);
                    App.seconds = App.total;
                    updateUI();
                } else {
                    console.error("Backend Error:", d.message);
                    document.getElementById('current-activity').innerText = "DB ERROR";
                    document.getElementById('prev-activity').innerText = "CHECK";
                    document.getElementById('next-activity').innerText = "RENDER LOGS";
                }
            } catch(e) { 
                console.error("Fetch Error:", e);
                document.getElementById('current-activity').innerText = "SERVER DOWN"; 
                document.getElementById('prev-activity').innerText = "WAKING";
                document.getElementById('next-activity').innerText = "UP...";
            }
        }

        function updateUI() {
            const abs = Math.abs(App.seconds);
            const h = Math.floor(abs/3600).toString().padStart(2,'0'), m = Math.floor((abs%3600)/60).toString().padStart(2,'0'), s = (abs%60).toString().padStart(2,'0');
            document.getElementById('main-timer').innerText = `${h}:${m}:${s}`;
        }

        async function sendMessage() {
            const i = document.getElementById('chat-input'), m = i.value; if(!m) return;
            appendBubble('user', m); i.value = '';
            try {
                const res = await fetch(`${API}/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: m }) });
                const r = await res.json(); 
                if(r.status === "success") {
                    appendBubble('ai', r.text);
                } else {
                    appendBubble('ai', "[System Error: Architect Offline]");
                }
            } catch(e) {
                appendBubble('ai', "[Network Error: Cannot reach server]");
            }
        }

        function appendBubble(role, text) {
            const w = document.getElementById('chat-window'), d = document.createElement('div');
            d.className = role === 'ai' ? 'p-4 bg-white/5 rounded-2xl text-xs self-start max-w-[80%] border border-white/5' : 'p-4 bg-white text-black rounded-2xl text-xs self-end ml-auto max-w-[80%]';
            d.innerText = text; w.appendChild(d); w.scrollTop = w.scrollHeight;
        }

        function switchTab(t) {
            ['dashboard', 'insights', 'analytics'].forEach(v => { document.getElementById(`view-${v}`).classList.add('hidden'); document.getElementById(`nav-${v}`).classList.replace('tab-active', 'tab-inactive'); });
            document.getElementById(`view-${t}`).classList.remove('hidden');
            document.getElementById(`nav-${t}`).classList.replace('tab-inactive', 'tab-active');
        }

        async function handleCheckIn() { App.seconds = App.total; updateUI(); }
        async function handlePauseResume() {}
        async function handleCheckOut() { location.reload(); }
    </script>
</body>
</html>
