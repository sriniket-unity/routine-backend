<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine Flow | Architect</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='white'/><path d='M30 50 L50 20 L45 50 L70 50 L50 80 L55 50 Z' fill='black'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { obsidian: '#050505', sage: '#E8F5E9', debt: '#FF6B6B', glass: 'rgba(255,255,255,0.03)' } } }
        }
    </script>
    <style>
        body { background-color: #000000; color: #E5E7EB; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-panel { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-active { color: white !important; border-bottom: 2px solid white !important; }
        .tab-inactive { color: rgba(255,255,255,0.3) !important; border-bottom: 2px solid transparent !important; }
        .clock-font { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.05em; }
        ::-webkit-scrollbar { display: none; }
        @keyframes pulse-sync { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .sync-active { animation: pulse-sync 2s infinite; color: #4ade80; }
    </style>
</head>
<body class="font-sans">

    <header class="fixed top-0 left-0 right-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-display text-xl font-900 tracking-tighter text-white uppercase italic">ROUTINE<span class="text-white/70 not-italic">FLOW</span></h1>
                <div class="flex items-center space-x-2">
                    <span id="header-live-clock" class="clock-font text-[10px] text-white/40 tracking-widest uppercase">00:00:00 AM</span>
                    <span id="sync-indicator" class="text-[8px] tracking-widest uppercase text-white/20"></span>
                </div>
            </div>
            <nav class="flex space-x-4 md:space-x-6 font-black text-[9px] md:text-[10px] tracking-[0.2em] md:tracking-[0.3em]">
                <button id="nav-dashboard" onclick="switchTab('dashboard')" class="pb-1 tab-active uppercase">DASHBOARD</button>
                <button id="nav-insights" onclick="switchTab('insights')" class="pb-1 tab-inactive uppercase">ARCHITECT</button>
                <button id="nav-analytics" onclick="switchTab('analytics')" class="pb-1 tab-inactive uppercase">ANALYTICS</button>
            </nav>
        </div>
    </header>

    <main class="pt-24 max-w-7xl mx-auto min-h-screen">
        
        <section id="view-dashboard" class="p-6 flex flex-col items-center space-y-12 md:space-y-20">
            
            <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-center">
                <div class="flex flex-col opacity-40">
                    <span class="text-[9px] uppercase tracking-widest mb-1">Previous</span>
                    <h3 id="prev-activity" class="font-black text-[10px] md:text-xs uppercase">---</h3>
                </div>
                
                <div class="flex flex-col items-center">
                    <span id="current-activity" class="border border-white/10 px-6 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-white/5">---</span>
                    <div class="mt-4 clock-font text-xl md:text-2xl font-black">
                        <span id="activity-progress" class="text-white">0.00h</span>
                        <span class="text-white/10 mx-1">/</span>
                        <span id="activity-total" class="text-white/40">0.00h</span>
                    </div>
                </div>

                <div class="flex flex-col opacity-40">
                    <span class="text-[9px] uppercase tracking-widest mb-1">Next</span>
                    <h3 id="next-activity" class="font-black text-[10px] md:text-xs uppercase">---</h3>
                </div>
            </div>

            <div id="main-timer" class="clock-font text-[18vw] md:text-[12rem] font-bold text-white tracking-tighter leading-none py-10">00:00:00</div>

            <div class="flex flex-col md:flex-row items-center gap-4 md:gap-6 w-full max-w-xl">
                <button onclick="handleCheckIn()" class="w-full md:flex-1 bg-white text-black py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform">Check-In</button>
                <button id="btn-pause" onclick="handlePauseResume()" class="w-full md:flex-1 border border-white/10 text-white/60 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:text-white active:scale-95 transition-transform">Pause</button>
                <button onclick="handleCheckOut(event)" class="w-full md:flex-1 border border-white/10 text-white/40 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:text-white active:scale-95 transition-transform">Check-Out</button>
            </div>

        </section>

        <section id="view-insights" class="hidden flex h-[calc(100vh-120px)]">
            <div class="w-64 border-r border-white/5 p-6 flex flex-col justify-between hidden md:flex">
                <div class="space-y-6">
                    <h4 class="text-[10px] font-black text-white/30 uppercase tracking-widest">Memory Logs</h4>
                    <div id="chat-history-list" class="space-y-2">
                        <div class="p-3 bg-white/5 rounded-xl text-[9px] font-bold text-white/60 uppercase">Persistent Session</div>
                    </div>
                </div>
                <button onclick="clearChatHistory()" class="w-full py-3 border border-debt/30 text-debt/60 hover:text-debt hover:border-debt rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">Clear History</button>
            </div>
            <div class="flex-1 flex flex-col relative bg-obsidian">
                <div id="chat-window" class="chat-container overflow-y-auto p-6 space-y-6 pb-40" style="height: calc(100vh - 220px);"></div>
                <div class="absolute bottom-6 left-0 right-0 px-6">
                    <div class="max-w-3xl mx-auto relative">
                        <input id="chat-input" type="text" placeholder="Consult Architect..." onkeypress="if(event.key === 'Enter') sendMessage()" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-sm focus:outline-none focus:border-white/20 transition-all">
                        <button onclick="sendMessage()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white text-black p-2 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg></button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-analytics" class="hidden p-6 space-y-8 max-w-5xl mx-auto">
             </section>
    </main>

    <div id="toast-container" class="fixed bottom-10 right-10 flex flex-col gap-4 z-[110]"></div>

    <script>
        const BackendAPI = "https://routine-backend-7yn2.onrender.com";
        let AppState = { currentActivity: null, allActivities: [], timerSeconds: 0, totalSeconds: 0, timerState: 'READY', timerInterval: null, accumulated_seconds: 0 };
        let localChatHistory = JSON.parse(localStorage.getItem('routine_chat_cache')) || [];

        document.addEventListener('DOMContentLoaded', () => {
            fetchDashboard();
            setInterval(updateHeaderClock, 1000);
            setInterval(syncWithCloud, 5000);
            syncWithCloud();

            if(localChatHistory.length > 0) {
                localChatHistory.forEach(m => appendBubble(m.type, m.text));
            }
        });

        async function fetchDashboard() {
            try {
                const res = await fetch(`${BackendAPI}/get_dashboard`);
                const d = await res.json();
                if (d.status === "success") {
                    AppState.currentActivity = d.cur;
                    document.getElementById('prev-activity').innerText = d.prev.Activity;
                    document.getElementById('current-activity').innerText = d.cur.Activity;
                    document.getElementById('next-activity').innerText = d.next.Activity;
                    AppState.totalSeconds = Math.round((parseFloat(d.cur.Duration) || 1) * 3600);
                    AppState.timerSeconds = AppState.totalSeconds;
                    document.getElementById('activity-total').innerText = `${parseFloat(d.cur.Duration).toFixed(2)}h`;
                    updateTimerDisplay();
                    reloadLocalState();
                }
            } catch(e) { showToast("Backend Sync Error", "error"); }
        }

        async function syncWithCloud() {
            try {
                const res = await fetch(`${BackendAPI}/get_state`);
                const result = await res.json();
                if (result.status === "success") {
                    const cloud = result.data;
                    const indicator = document.getElementById('sync-indicator');
                    indicator.innerText = ""; 
                    indicator.className = cloud.state === 'RUNNING' ? "text-[8px] sync-active" : "text-[8px] text-white/20";

                    if (cloud.state === 'RUNNING' && cloud.start_time) {
                        const localStart = localStorage.getItem('routine_timer_start');
                        if (!localStart || localStorage.getItem('routine_timer_activity') !== cloud.activity) {
                            localStorage.setItem('routine_timer_start', cloud.start_time);
                            localStorage.setItem('routine_timer_activity', cloud.activity);
                            localStorage.setItem('routine_timer_accumulated', cloud.accumulated_seconds || 0);
                            AppState.accumulated_seconds = cloud.accumulated_seconds || 0;
                            AppState.timerState = 'RUNNING';
                            document.getElementById('btn-pause').innerText = "PAUSE";
                            startTimerLoop();
                        }
                    } else if (cloud.state === 'PAUSED') {
                        if (AppState.timerState !== 'PAUSED') {
                            clearInterval(AppState.timerInterval);
                            AppState.timerState = 'PAUSED';
                            AppState.accumulated_seconds = cloud.accumulated_seconds || 0;
                            localStorage.setItem('routine_timer_accumulated', AppState.accumulated_seconds);
                            localStorage.removeItem('routine_timer_start');
                            document.getElementById('btn-pause').innerText = "RESUME";
                            AppState.timerSeconds = AppState.totalSeconds - AppState.accumulated_seconds;
                            updateTimerDisplay();
                        }
                    } else if (cloud.state === 'READY' && AppState.timerState !== 'READY') {
                         clearInterval(AppState.timerInterval);
                         AppState.timerState = 'READY';
                         localStorage.clear();
                         location.reload(); 
                    }
                }
            } catch(e) { document.getElementById('sync-indicator').innerText = "SYNC OFFLINE"; }
        }

        async function handleCheckIn() { 
            if(AppState.timerState !== 'READY') return;
            AppState.timerState = 'RUNNING'; 
            const startTime = Date.now();
            localStorage.setItem('routine_timer_start', startTime);
            localStorage.setItem('routine_timer_activity', AppState.currentActivity.Activity);
            startTimerLoop();
            document.getElementById('btn-pause').innerText = "PAUSE";
            await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'RUNNING', activity: AppState.currentActivity.Activity, start_time: startTime, accumulated_seconds: 0 }) });
        }

        async function handlePauseResume() {
            if (AppState.timerState === 'READY') return;
            if (AppState.timerState === 'RUNNING') {
                clearInterval(AppState.timerInterval);
                AppState.timerState = 'PAUSED';
                const start = parseInt(localStorage.getItem('routine_timer_start'));
                if (start) AppState.accumulated_seconds += Math.floor((Date.now() - start) / 1000);
                localStorage.setItem('routine_timer_accumulated', AppState.accumulated_seconds);
                localStorage.removeItem('routine_timer_start');
                document.getElementById('btn-pause').innerText = "RESUME";
                await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'PAUSED', activity: AppState.currentActivity.Activity, start_time: null, accumulated_seconds: AppState.accumulated_seconds }) });
            } else {
                AppState.timerState = 'RUNNING';
                const start = Date.now();
                localStorage.setItem('routine_timer_start', start);
                document.getElementById('btn-pause').innerText = "PAUSE";
                startTimerLoop();
                await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'RUNNING', activity: AppState.currentActivity.Activity, start_time: start, accumulated_seconds: AppState.accumulated_seconds }) });
            }
        }

        async function handleCheckOut(event) { 
            if (AppState.timerState === 'READY') return;
            clearInterval(AppState.timerInterval); 
            if (AppState.timerState === 'RUNNING') {
                const start = parseInt(localStorage.getItem('routine_timer_start'));
                if (start) AppState.accumulated_seconds += Math.floor((Date.now() - start) / 1000);
            }
            const worked = AppState.accumulated_seconds;
            const actualHrs = worked / 3600;
            const plannedHrs = parseFloat(AppState.currentActivity.Duration);
            event.target.innerText = "Saving...";
            await fetch(`${BackendAPI}/log_session`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ activity: AppState.currentActivity.Activity, planned_duration: plannedHrs, actual_duration: actualHrs, time_debt: Math.max(0, plannedHrs - actualHrs) }) }); 
            await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'READY', activity: null, start_time: null, accumulated_seconds: 0 }) });
            localStorage.clear();
            location.reload(); 
        }

        function startTimerLoop() {
            if(AppState.timerInterval) clearInterval(AppState.timerInterval);
            AppState.timerInterval = setInterval(() => { 
                const start = parseInt(localStorage.getItem('routine_timer_start'));
                const acc = parseInt(localStorage.getItem('routine_timer_accumulated')) || 0;
                if (start) AppState.timerSeconds = AppState.totalSeconds - (Math.floor((Date.now() - start) / 1000) + acc);
                else if (acc > 0) AppState.timerSeconds = AppState.totalSeconds - acc;
                if (AppState.timerSeconds < 0) AppState.timerSeconds = 0; 
                updateTimerDisplay(); 
            }, 1000);
        }

        function updateTimerDisplay() {
            const abs = Math.abs(AppState.timerSeconds);
            const h = Math.floor(abs/3600).toString().padStart(2,'0'), m = Math.floor((abs%3600)/60).toString().padStart(2,'0'), s = (abs%60).toString().padStart(2,'0');
            document.getElementById('main-timer').innerText = `${h}:${m}:${s}`;
            document.getElementById('activity-progress').innerText = `${Math.max(0, (AppState.totalSeconds - AppState.timerSeconds)/3600).toFixed(2)}h`;
        }

        function reloadLocalState() {
            const start = localStorage.getItem('routine_timer_start');
            const act = localStorage.getItem('routine_timer_activity');
            const acc = localStorage.getItem('routine_timer_accumulated');
            if (act === AppState.currentActivity.Activity) {
                AppState.accumulated_seconds = parseInt(acc) || 0;
                if (start) { AppState.timerState = 'RUNNING'; startTimerLoop(); document.getElementById('btn-pause').innerText = "PAUSE"; }
                else if (AppState.accumulated_seconds > 0) { AppState.timerState = 'PAUSED'; document.getElementById('btn-pause').innerText = "RESUME"; updateTimerDisplay(); }
            }
        }

        function updateHeaderClock() {
            const now = new Date();
            document.getElementById('header-live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }

        function switchTab(view) {
            ['dashboard', 'insights', 'analytics'].forEach(s => { document.getElementById(`view-${s}`).classList.add('hidden'); document.getElementById(`nav-${s}`).classList.replace('tab-active', 'tab-inactive'); });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.replace('tab-inactive', 'tab-active');
        }

        function showToast(m, t) {
            const container = document.getElementById('toast-container'), toast = document.createElement('div');
            toast.className = `px-8 py-5 rounded-3xl glass-panel border border-white/10 text-[10px] font-black uppercase tracking-widest shadow-2xl animate-in slide-in-from-right-10`;
            toast.innerText = m;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;
            appendBubble('user', msg);
            input.value = '';
            const res = await fetch(`${BackendAPI}/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: msg }) });
            const result = await res.json();
            if(result.status === "success") appendBubble('ai', result.text);
        }

        function appendBubble(type, text) {
            const win = document.getElementById('chat-window'), div = document.createElement('div');
            div.className = type === 'ai' ? 'chat-bubble-ai p-5 max-w-[85%] text-sm self-start' : 'chat-bubble-user p-5 max-w-[85%] text-sm self-end ml-auto';
            div.innerHTML = text.replace(/\n/g, '<br>');
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
