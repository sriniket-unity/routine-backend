<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine Flow | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { obsidian: '#000000', sage: '#E8F5E9', debt: '#FF6B6B' } } }
        }
    </script>
    <style>
        body { background-color: #000000; color: #E5E7EB; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-panel { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .timer-glow { text-shadow: 0 0 50px rgba(255,255,255,0.15); }
        .zone-panel { border-left: 2px solid rgba(255,255,255,0.1); padding-left: 1rem; }
        .tab-active { color: white !important; border-bottom: 2px solid white !important; }
        .tab-inactive { color: rgba(255,255,255,0.3) !important; border-bottom: 2px solid transparent !important; }
    </style>
</head>
<body class="font-sans">

    <header class="fixed top-0 left-0 right-0 z-50 glass-panel">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="font-display text-xl md:text-2xl font-900 tracking-tighter text-white uppercase italic">ROUTINE<span class="text-white/70 not-italic">FLOW</span></h1>
            <nav class="flex space-x-6 md:space-x-10 font-black text-[10px] tracking-[0.4em]">
                <button id="nav-dashboard" onclick="switchTab('dashboard')" class="pb-1 tab-active uppercase">DASHBOARD</button>
                <button id="nav-insights" onclick="switchTab('insights')" class="pb-1 tab-inactive uppercase">INSIGHTS</button>
            </nav>
        </div>
    </header>

    <main class="pt-32 md:pt-40 pb-12 px-6 max-w-6xl mx-auto min-h-screen">
        <section id="view-dashboard" class="space-y-16 md:space-y-24">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
                <div class="zone-panel flex flex-col space-y-1">
                    <span class="text-[10px] font-black tracking-widest text-white/30 uppercase">Previous</span>
                    <h3 id="prev-activity" class="text-white text-sm font-black uppercase">---</h3>
                    <span id="prev-progress" class="text-white/50 font-mono text-[10px]">0.0h / 0.0h</span>
                </div>
                <div class="flex flex-col items-center space-y-4">
                    <span id="current-activity" class="text-white text-sm font-black tracking-[0.2em] px-8 py-3 rounded-full border-2 border-white/20 bg-black text-center min-w-[160px] uppercase">---</span>
                    <div class="flex items-baseline space-x-2 font-mono">
                        <span id="activity-progress" class="text-white text-2xl md:text-3xl font-black">0.0h</span>
                        <span class="text-white/20 text-lg">/</span>
                        <span id="activity-total" class="text-white/60 text-sm font-bold">0.0h</span>
                    </div>
                </div>
                <div class="zone-panel border-l-2 md:border-l flex flex-col space-y-1 items-end md:items-start text-right md:text-left">
                    <span class="text-[10px] font-black tracking-widest text-white/30 uppercase">Next</span>
                    <h3 id="next-activity" class="text-white text-sm font-black uppercase">---</h3>
                    <span id="next-total" class="text-white/30 font-mono text-[10px]">0.0h / 0.0h</span>
                </div>
            </div>

            <div class="flex flex-col items-center space-y-10">
                <div id="main-timer" class="font-mono text-5xl md:text-[10rem] font-800 tracking-tighter text-white timer-glow leading-none">00h:00m:00s</div>
                <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto px-4">
                    <button onclick="handleCheckIn()" class="bg-white text-black font-black px-12 py-4 rounded-2xl tracking-[0.2em] text-xs uppercase">CHECK-IN</button>
                    <button onclick="handleCheckOut()" class="bg-card text-white border border-white/20 font-black px-12 py-4 rounded-2xl tracking-[0.2em] text-xs uppercase">CHECK-OUT</button>
                </div>
            </div>
        </section>

        <section id="view-insights" class="hidden space-y-12">
            <h2 class="text-white text-2xl md:text-3xl font-black uppercase tracking-tight">Strategy <span class="text-white/20">Engine</span></h2>
            <div id="insights-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>
    </main>

    <div id="loading-state" class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <div class="w-8 h-8 border-4 border-white/10 border-t-white rounded-full animate-spin"></div>
    </div>

    <div id="toast-container" class="fixed bottom-10 right-10 flex flex-col gap-4 z-[110]"></div>

    <script>
        const BackendAPI = "https://routine-backend-7yn2.onrender.com";
        let AppState = { currentActivity: null, allActivities: [], timerSeconds: 0, totalSeconds: 0, timerState: 'READY', timerInterval: null };
        let lastUpdate = { activity: null, originalVal: null };

        document.addEventListener('DOMContentLoaded', fetchSchedule);

        function parseTimeToMinutes(timeStr) {
            const [time, mod] = timeStr.trim().split(' ');
            let [h, m] = time.split(':');
            h = parseInt(h); if(h === 12) h = 0;
            let t = h * 60 + parseInt(m);
            return mod === 'PM' ? t + 720 : t;
        }

        async function fetchSchedule() {
            try {
                const res = await fetch(`${BackendAPI}/get_schedule`);
                const result = await res.json();
                if (result.status === "success") {
                    AppState.allActivities = result.data;
                    const now = new Date();
                    const curIST = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' });
                    const curMin = parseTimeToMinutes(curIST);
                    let idx = result.data.findIndex(i => {
                        const [s, e] = i.Time.split('-').map(parseTimeToMinutes);
                        return e < s ? (curMin >= s || curMin <= e) : (curMin >= s && curMin <= e);
                    });
                    if(idx === -1) idx = 0;
                    const data = result.data[idx];
                    const prev = result.data[idx-1] || result.data[result.data.length-1];
                    const next = result.data[idx+1] || result.data[0];
                    document.getElementById('current-activity').innerText = data.Activity;
                    const totalHrs = parseFloat(data.Duration) || 1;
                    AppState.totalSeconds = Math.round(totalHrs * 3600);
                    AppState.timerSeconds = AppState.totalSeconds;
                    document.getElementById('activity-total').innerText = `${totalHrs.toFixed(1)}h`;
                    document.getElementById('prev-activity').innerText = prev.Activity;
                    document.getElementById('prev-progress').innerText = `${parseFloat(prev.Duration).toFixed(1)}h / ${parseFloat(prev.Duration).toFixed(1)}h`;
                    document.getElementById('next-activity').innerText = next.Activity;
                    document.getElementById('next-total').innerText = `0.0h / ${parseFloat(next.Duration).toFixed(1)}h`;
                    updateTimerDisplay();
                }
            } finally { if(document.getElementById('loading-state')) document.getElementById('loading-state').remove(); }
        }

        function updateTimerDisplay() {
            const abs = Math.abs(AppState.timerSeconds);
            const h = Math.floor(abs/3600).toString().padStart(2,'0');
            const m = Math.floor((abs%3600)/60).toString().padStart(2,'0');
            const s = (abs%60).toString().padStart(2,'0');
            document.getElementById('main-timer').innerText = `${h}h:${m}m:${s}s`;
            document.getElementById('activity-progress').innerText = `${Math.max(0, (AppState.totalSeconds - AppState.timerSeconds)/3600).toFixed(1)}h`;
        }

        function handleCheckIn() {
            if(AppState.timerState !== 'READY') return;
            AppState.timerState = 'RUNNING';
            AppState.timerInterval = setInterval(() => { AppState.timerSeconds--; updateTimerDisplay(); }, 1000);
        }

        async function handleCheckOut() {
            const dur = Math.floor((AppState.totalSeconds - AppState.timerSeconds)/60);
            await fetch(`${BackendAPI}/log_session`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ activity: AppState.currentActivity.Activity, planned_duration: AppState.currentActivity.Duration, actual_duration: dur })
            });
            location.reload();
        }

        async function fetchInsights() {
            const grid = document.getElementById('insights-grid');
            grid.innerHTML = '<div class="col-span-full py-12 text-white/20 text-center animate-pulse text-[10px] uppercase tracking-widest">Engine Connecting...</div>';
            try {
                const res = await fetch(`${BackendAPI}/analyze_patterns`);
                const result = await res.json();
                if (result.status === "success" && result.analysis) {
                    const i = result.analysis;
                    const targetActivity = AppState.allActivities.find(a => a.Activity === i.action_target);
                    // Ensure we have clean duration values
                    const originalVal = targetActivity ? targetActivity.Duration : "0h";
                    renderInsightCard(i.action_target, i.new_val, originalVal, i.title, i.message);
                } else { grid.innerHTML = '<p class="col-span-full text-center text-white/20 text-[10px] uppercase">Need 3+ Logs to Start Analysis</p>'; }
            } catch (e) { grid.innerHTML = '<p class="col-span-full text-center text-debt text-[10px] font-black uppercase">Strategy Engine Offline</p>'; }
        }

        function renderInsightCard(activity, newVal, originalVal, title, message, showUndo = false) {
            const grid = document.getElementById('insights-grid');
            // FIXED: HUMAN-READABLE ACTION MAPPING
            const displayOriginal = originalVal.toLowerCase().includes('h') ? originalVal : `${originalVal}h`;
            const displayNew = newVal.toLowerCase().includes('h') ? newVal : `${newVal}h`;

            grid.innerHTML = `
                <div class="bg-card border border-white/10 p-8 rounded-[2.5rem] flex flex-col space-y-6 animate-in fade-in zoom-in duration-500">
                    <div class="flex flex-col space-y-2">
                        <span class="text-sage text-[10px] font-black tracking-[0.5em] uppercase">AI Optimization</span>
                        <h4 class="text-white font-display text-xl font-black uppercase italic tracking-tight">${title}</h4>
                    </div>
                    
                    <p class="text-white/50 text-sm font-medium leading-relaxed italic">
                        "${message}"
                    </p>

                    <div class="pt-6 border-t border-white/5">
                        <button onclick="${!showUndo ? `applyStrategy('${activity}', '${newVal}', '${originalVal}')` : `undoStrategy()`}" 
                            class="w-full py-5 ${!showUndo ? 'bg-white text-black' : 'bg-card text-white border border-white/20'} rounded-2xl font-black text-[11px] uppercase tracking-[0.2em] hover:scale-[1.02] active:scale-95 transition-all shadow-xl">
                            ${!showUndo ? `ADJUST ${activity}: ${displayOriginal} ➔ ${displayNew}` : `REVERT ${activity}: ${displayNew} ➔ ${displayOriginal}`}
                        </button>
                    </div>
                </div>`;
        }

        async function applyStrategy(act, newVal, orig) {
            showToast('Applying Update...', 'info');
            const res = await fetch(`${BackendAPI}/update_timetable`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ activity: act, new_val: newVal }) 
            });
            if(res.ok) { 
                lastUpdate = { activity: act, originalVal: orig }; 
                renderInsightCard(act, newVal, orig, "ADJUSTMENT LIVE", "Your schedule has been successfully updated in the database.", true);
                showToast('Schedule Synchronized', 'success');
            }
        }

        async function undoStrategy() {
            showToast('Reverting...', 'info');
            await fetch(`${BackendAPI}/update_timetable`, { 
                method: 'PATCH', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ activity: lastUpdate.activity, new_val: lastUpdate.originalVal }) 
            });
            location.reload();
        }

        function switchTab(view) {
            const dash = document.getElementById('view-dashboard'), ins = document.getElementById('view-insights');
            const dBtn = document.getElementById('nav-dashboard'), iBtn = document.getElementById('nav-insights');
            if(view === 'dashboard') {
                dash.classList.remove('hidden'); ins.classList.add('hidden');
                dBtn.classList.replace('tab-inactive', 'tab-active'); iBtn.classList.replace('tab-active', 'tab-inactive');
            } else {
                dash.classList.add('hidden'); ins.classList.remove('hidden');
                iBtn.classList.replace('tab-inactive', 'tab-active'); dBtn.classList.replace('tab-active', 'tab-inactive');
                fetchInsights();
            }
        }

        function showToast(m, t) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-8 py-5 rounded-3xl glass-panel border border-white/10 text-[10px] font-black uppercase tracking-widest shadow-2xl animate-in slide-in-from-right-10`;
            toast.innerText = m;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
