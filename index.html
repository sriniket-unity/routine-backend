<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine Flow | Command Center</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='white'/><path d='M30 50 L50 20 L45 50 L70 50 L50 80 L55 50 Z' fill='black'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { obsidian: '#000000', sage: '#E8F5E9', debt: '#FF6B6B', chart: '#6366F1' } } }
        }
    </script>
    <style>
        body { background-color: #000000; color: #E5E7EB; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-panel { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-active { color: white !important; border-bottom: 2px solid white !important; }
        .tab-inactive { color: rgba(255,255,255,0.3) !important; border-bottom: 2px solid transparent !important; }
        .toast-error { border-color: #FF6B6B !important; color: #FF6B6B !important; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; padding: 1.5rem; }
        .chart-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="font-sans">

    <header class="fixed top-0 left-0 right-0 z-50 glass-panel">
        <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
            <h1 class="font-display text-xl md:text-2xl font-900 tracking-tighter text-white uppercase italic">ROUTINE<span class="text-white/70 not-italic">FLOW</span></h1>
            <nav class="flex space-x-4 md:space-x-10 font-black text-[9px] md:text-[10px] tracking-[0.3em]">
                <button id="nav-dashboard" onclick="switchTab('dashboard')" class="pb-1 tab-active uppercase">DASHBOARD</button>
                <button id="nav-insights" onclick="switchTab('insights')" class="pb-1 tab-inactive uppercase">INSIGHTS</button>
                <button id="nav-analytics" onclick="switchTab('analytics')" class="pb-1 tab-inactive uppercase">ANALYTICS</button>
            </nav>
        </div>
    </header>

    <main class="pt-32 md:pt-40 pb-12 px-6 max-w-6xl mx-auto min-h-screen">
        
        <section id="view-dashboard" class="space-y-16 md:space-y-24">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-center md:text-left">
                <div class="zone-panel flex flex-col space-y-1"><span class="text-[10px] font-black text-white/30 uppercase tracking-widest">Previous</span><h3 id="prev-activity" class="text-white text-sm font-black uppercase">---</h3><span id="prev-progress" class="text-white/50 font-mono text-[10px]">0.00h / 0.00h</span></div>
                <div class="flex flex-col items-center space-y-4"><span id="current-activity" class="text-white text-sm font-black tracking-[0.2em] px-8 py-3 rounded-full border-2 border-white/20 bg-black min-w-[180px] uppercase">---</span><div class="flex items-baseline space-x-2 font-mono"><span id="activity-progress" class="text-white text-2xl md:text-3xl font-black">0.00h</span><span class="text-white/20 text-lg">/</span><span id="activity-total" class="text-white/60 text-sm font-bold">0.00h</span></div></div>
                <div class="zone-panel border-l-2 md:border-l flex flex-col space-y-1 items-end md:items-start text-right md:text-left"><span class="text-[10px] font-black text-white/30 uppercase tracking-widest">Next</span><h3 id="next-activity" class="text-white text-sm font-black uppercase">---</h3><span id="next-total" class="text-white/30 font-mono text-[10px]">0.00h / 0.00h</span></div>
            </div>
            <div class="flex flex-col items-center space-y-10">
                <div id="main-timer" class="font-mono text-5xl md:text-[10rem] font-800 tracking-tighter text-white leading-none">00h:00m:00s</div>
                <div class="flex flex-col sm:flex-row gap-4 w-full sm:w-auto px-4">
                    <button onclick="handleCheckIn()" class="bg-white text-black font-black px-12 py-4 rounded-2xl tracking-[0.2em] text-xs uppercase">CHECK-IN</button>
                    <button onclick="handleCheckOut()" class="bg-card text-white border border-white/20 font-black px-12 py-4 rounded-2xl tracking-[0.2em] text-xs uppercase">CHECK-OUT</button>
                </div>
            </div>
        </section>

        <section id="view-insights" class="hidden space-y-12">
            <h2 class="text-white text-2xl md:text-3xl font-black uppercase tracking-tight">Strategy <span class="text-white/20">Engine</span></h2>
            <div id="insights-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </section>

        <section id="view-analytics" class="hidden space-y-8">
            <div class="flex justify-between items-center">
                <h2 class="text-white text-2xl md:text-3xl font-black uppercase tracking-tight">Performance <span class="text-white/20">Metrics</span></h2>
                <div class="flex bg-white/5 p-1 rounded-xl">
                    <button onclick="toggleRange('week')" id="btn-week" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all">Week</button>
                    <button onclick="toggleRange('overall')" id="btn-overall" class="px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all">Overall</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="stat-card flex flex-col justify-between h-40">
                    <span class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em]">Total Study</span>
                    <div class="flex items-baseline space-x-2"><span id="stat-study-hrs" class="text-4xl font-black text-white">0.0</span><span class="text-sm font-bold text-white/20 uppercase tracking-widest">Hours</span></div>
                    <div class="w-full bg-white/5 h-1 rounded-full overflow-hidden"><div id="study-progress-bar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div></div>
                </div>
                <div class="stat-card flex flex-col justify-between h-40">
                    <span class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em]">Adherence Rate</span>
                    <div class="flex items-baseline space-x-2"><span id="stat-adherence" class="text-4xl font-black text-white">0%</span></div>
                    <span class="text-[10px] font-bold text-sage/40 uppercase tracking-widest">Consistency Score</span>
                </div>
                <div class="stat-card flex flex-col justify-between h-40">
                    <span class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em]">Time Debt</span>
                    <div class="flex items-baseline space-x-2"><span id="stat-debt" class="text-4xl font-black text-debt">0.0</span><span class="text-sm font-bold text-debt/20 uppercase tracking-widest">Hours</span></div>
                    <span class="text-[10px] font-bold text-debt/40 uppercase tracking-widest">Session Shortfall</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="stat-card min-h-[300px] flex flex-col items-center justify-center">
                    <div class="relative w-32 h-32 flex items-center justify-center">
                        <svg class="absolute inset-0 w-full h-full -rotate-90">
                            <circle cx="64" cy="64" r="54" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="12"/>
                            <circle id="adherence-circle" cx="64" cy="64" r="54" fill="transparent" stroke="white" stroke-width="12" stroke-dasharray="339.29" stroke-dashoffset="339.29" class="transition-all duration-1000"/>
                        </svg>
                        <span id="circle-pct" class="text-xl font-black">0%</span>
                    </div>
                    <span class="mt-6 text-[10px] font-black uppercase text-white/30 tracking-[0.3em]">Habit Strength</span>
                </div>
                <div class="stat-card min-h-[300px] flex flex-col justify-end p-8 space-y-4">
                    <div id="chart-bars" class="flex items-end space-x-2 h-32">
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                    </div>
                    <span class="text-[10px] font-black uppercase text-white/30 tracking-[0.3em]">Load Balance (Mon-Sun)</span>
                </div>
            </div>
        </section>
    </main>

    <div id="loading-state" class="fixed inset-0 z-[100] bg-black flex items-center justify-center"><div class="w-8 h-8 border-4 border-white/10 border-t-white rounded-full animate-spin"></div></div>
    <div id="toast-container" class="fixed bottom-10 right-10 flex flex-col gap-4 z-[110]"></div>

    <script>
        const BackendAPI = "https://routine-backend-7yn2.onrender.com";
        let AppState = { currentActivity: null, allActivities: [], timerSeconds: 0, totalSeconds: 0, timerState: 'READY', analyticsData: null };
        let lastUpdate = JSON.parse(localStorage.getItem('routine_last_update')) || { activity: null, originalVal: null };

        document.addEventListener('DOMContentLoaded', fetchSchedule);

        async function fetchSchedule() {
            try {
                const res = await fetch(`${BackendAPI}/get_schedule`);
                const result = await res.json();
                if (result.status === "success") {
                    AppState.allActivities = result.data;
                    updateDashboardUI();
                }
            } finally { document.getElementById('loading-state')?.remove(); }
        }

        function updateDashboardUI() {
            const now = new Date();
            const curIST = now.toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' });
            const parseTime = (t) => {
                const [time, mod] = t.split(' ');
                let [h, m] = time.split(':').map(Number);
                if(h === 12) h = 0;
                return (mod === 'PM' ? h + 12 : h) * 60 + m;
            };
            const curMin = parseTime(curIST);
            let idx = AppState.allActivities.findIndex(i => {
                const [s, e] = i.Time.split('-').map(parseTime);
                return e < s ? (curMin >= s || curMin <= e) : (curMin >= s && curMin <= e);
            });
            if(idx === -1) idx = 0;
            const data = AppState.allActivities[idx];
            AppState.currentActivity = data;
            document.getElementById('current-activity').innerText = data.Activity;
            const hrs = parseFloat(data.Duration) || 1;
            AppState.totalSeconds = Math.round(hrs * 3600);
            AppState.timerSeconds = AppState.totalSeconds;
            document.getElementById('activity-total').innerText = `${hrs.toFixed(2)}h`;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const abs = Math.abs(AppState.timerSeconds);
            const h = Math.floor(abs/3600).toString().padStart(2,'0'), m = Math.floor((abs%3600)/60).toString().padStart(2,'0'), s = (abs%60).toString().padStart(2,'0');
            document.getElementById('main-timer').innerText = `${h}h:${m}m:${s}s`;
            document.getElementById('activity-progress').innerText = `${Math.max(0, (AppState.totalSeconds - AppState.timerSeconds)/3600).toFixed(2)}h`;
        }

        function handleCheckIn() {
            if(AppState.timerState !== 'READY') return;
            AppState.timerState = 'RUNNING';
            AppState.timerInterval = setInterval(() => { AppState.timerSeconds--; updateTimerDisplay(); }, 1000);
        }

        async function handleCheckOut() {
            clearInterval(AppState.timerInterval);
            const planned = parseFloat(AppState.currentActivity.Duration) || 0;
            const actual = parseFloat(((AppState.totalSeconds - AppState.timerSeconds)/3600).toFixed(2));
            const debt = parseFloat(Math.max(0, planned - actual).toFixed(2));
            await fetch(`${BackendAPI}/log_session`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ activity: AppState.currentActivity.Activity, planned_duration: planned, actual_duration: actual, time_debt: debt })
            });
            location.reload();
        }

        async function fetchAnalytics() {
            try {
                const res = await fetch(`${BackendAPI}/get_analytics`);
                const result = await res.json();
                if (result.status === "success") {
                    AppState.analyticsData = result;
                    toggleRange('week');
                }
            } catch (e) { showToast("Analytics Offline", "error"); }
        }

        function toggleRange(range) {
            const w = document.getElementById('btn-week'), o = document.getElementById('btn-overall');
            const data = range === 'week' ? AppState.analyticsData.week : AppState.analyticsData.overall;
            
            w.className = range === 'week' ? "px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all" : "px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all";
            o.className = range === 'overall' ? "px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all" : "px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all";

            if(!data) return;
            document.getElementById('stat-study-hrs').innerText = data.study;
            document.getElementById('stat-adherence').innerText = data.adherence + "%";
            document.getElementById('stat-debt').innerText = data.debt;
            document.getElementById('study-progress-bar').style.width = Math.min(100, (data.study / 10) * 100) + "%";
            
            // Update Circle
            const offset = 339.29 - (339.29 * data.adherence) / 100;
            document.getElementById('adherence-circle').style.strokeDashoffset = offset;
            document.getElementById('circle-pct').innerText = data.adherence + "%";

            // Update Chart Bars
            const maxVal = Math.max(...data.chart, 1);
            const bars = document.getElementById('chart-bars').children;
            data.chart.forEach((val, i) => {
                const height = Math.max(5, (val / maxVal) * 100);
                bars[i].style.height = height + "%";
                bars[i].className = val > 0 ? "bg-white w-full rounded-t-lg chart-bar" : "bg-white/10 w-full rounded-t-lg chart-bar";
            });
        }

        async function fetchInsights() {
            const grid = document.getElementById('insights-grid');
            grid.innerHTML = '<div class="col-span-full py-12 text-white/20 text-center animate-pulse text-[10px] uppercase tracking-widest">Connecting...</div>';
            try {
                const res = await fetch(`${BackendAPI}/analyze_patterns`);
                const result = await res.json();
                if (result.status === "success" && result.analysis) {
                    const i = result.analysis;
                    const target = AppState.allActivities.find(a => a.Activity.trim().toLowerCase() === i.action_target.trim().toLowerCase());
                    renderInsightCard(i.action_target, i.new_val, target?.Duration || "Unknown", i.title, i.message);
                }
            } catch (e) { grid.innerHTML = '<p class="col-span-full text-center text-debt text-[10px] font-black uppercase">Offline</p>'; }
        }

        function renderInsightCard(activity, newVal, originalVal, title, message, showUndo = false) {
            const grid = document.getElementById('insights-grid');
            grid.innerHTML = `<div class="bg-card border border-white/10 p-8 rounded-[2.5rem] flex flex-col space-y-6"><div class="flex flex-col space-y-2"><span class="text-sage text-[10px] font-black tracking-[0.5em] uppercase">AI Optimization</span><h4 class="text-white font-display text-xl font-black uppercase italic tracking-tight">${title}</h4></div><p class="text-white/50 text-sm font-medium leading-relaxed italic">"${message}"</p><div class="pt-6 border-t border-white/5"><button onclick="applyStrategy('${activity}', '${newVal}', '${originalVal}')" class="w-full py-5 bg-white text-black rounded-2xl font-black text-[11px] uppercase tracking-[0.2em]">${activity}: ${originalVal} ➔ ${newVal}</button></div></div>`;
        }

        function switchTab(view) {
            const sections = ['dashboard', 'insights', 'analytics'];
            sections.forEach(s => {
                document.getElementById(`view-${s}`).classList.add('hidden');
                document.getElementById(`nav-${s}`).classList.replace('tab-active', 'tab-inactive');
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.replace('tab-inactive', 'tab-active');
            if(view === 'analytics') fetchAnalytics();
            if(view === 'insights') fetchInsights();
        }

        function showToast(m, t) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-8 py-5 rounded-3xl glass-panel border ${t === 'error' ? 'toast-error' : 'border-white/10'} text-[10px] font-black uppercase tracking-widest shadow-2xl animate-in slide-in-from-right-10`;
            toast.innerText = m;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
