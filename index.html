<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine Flow | Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { obsidian: '#050505', sage: '#E8F5E9', debt: '#FF6B6B', glass: 'rgba(255,255,255,0.03)' } } }
        }
    </script>
    <style>
        body { background-color: #000000; color: #E5E7EB; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .glass-panel { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-active { color: white !important; border-bottom: 2px solid white !important; }
        .tab-inactive { color: rgba(255,255,255,0.3) !important; border-bottom: 2px solid transparent !important; }
        .chat-container { height: calc(100vh - 120px); scrollbar-width: none; }
        .chat-bubble-ai { background: rgba(255,255,255,0.05); border-radius: 0 1.5rem 1.5rem 1.5rem; }
        .chat-bubble-user { background: #FFFFFF; color: #000000; border-radius: 1.5rem 1.5rem 0 1.5rem; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; padding: 1.5rem; }
        .chart-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .clock-font { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.05em; }
        ::-webkit-scrollbar { display: none; }
        @keyframes pulse-sync { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
        .sync-active { animation: pulse-sync 2s infinite; color: #4ade80; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        
        /* Thinking Animation Styling */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="font-sans">

    <header class="fixed top-0 left-0 right-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-display text-xl font-900 tracking-tighter text-white uppercase italic">ROUTINE<span class="text-white/70 not-italic">FLOW</span></h1>
                <div class="flex items-center space-x-2">
                    <span id="header-live-clock" class="clock-font text-[10px] text-white/40 tracking-widest uppercase">00:00:00 AM</span>
                    <span id="sync-indicator" class="text-[8px] tracking-widest uppercase text-white/20"></span>
                </div>
            </div>
            <nav class="flex space-x-6 font-black text-[10px] tracking-[0.3em]">
                <button id="nav-dashboard" onclick="switchTab('dashboard')" class="pb-1 tab-active uppercase">DASHBOARD</button>
                <button id="nav-insights" onclick="switchTab('insights')" class="pb-1 tab-inactive uppercase">ARCHITECT</button>
                <button id="nav-analytics" onclick="switchTab('analytics')" class="pb-1 tab-inactive uppercase">ANALYTICS</button>
            </nav>
        </div>
    </header>

    <main class="pt-24 max-w-7xl mx-auto min-h-screen">
        <section id="view-dashboard" class="p-6 flex flex-col items-center space-y-12">
            <div class="w-full grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-center text-[12px] uppercase font-black">
                <div id="prev-activity" class="text-white/70">---</div>
                <div id="current-activity" class="text-white border border-white/10 px-4 py-1 rounded-full">LOADING...</div>
                <div id="next-activity" class="text-white/70">---</div>
            </div>
            <div class="flex flex-col items-center justify-center">
                <div id="main-timer" class="clock-font text-[18vw] md:text-[10rem] font-bold text-white tracking-tighter leading-none py-10">00:00:00</div>
                <div class="flex flex-col md:flex-row items-center gap-4 w-full max-w-xl">
                    <button onclick="handleCheckIn()" class="w-full md:flex-1 bg-white text-black py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform">Check-In</button>
                    <button id="btn-pause" onclick="handlePauseResume()" class="w-full md:flex-1 border border-yellow-400/30 text-yellow-400 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white/5 active:scale-95 transition-transform">Pause</button>
                    <button onclick="handleCheckOut(event)" class="w-full md:flex-1 border border-white/10 text-white/40 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white/5 active:scale-95 transition-transform">Check-Out</button>
                </div>
            </div>
        </section>

        <section id="view-insights" class="hidden chat-container p-6 pt-0">
            <div class="flex h-full gap-6">
                <div class="hidden md:flex flex-col w-64 bg-white/5 rounded-3xl p-4 border border-white/5">
                    <h3 class="text-[10px] font-black uppercase tracking-widest text-white/50 mb-4 px-2">Architect Link</h3>
                    <div class="flex-1 overflow-y-auto space-y-2">
                        <div class="p-4 bg-white/10 rounded-xl text-xs font-bold text-white/80 cursor-default border border-white/10 shadow-lg">Active Memory Session</div>
                    </div>
                    <div class="pt-4 border-t border-white/10 mt-auto space-y-2">
                        <button onclick="clearChatHistory()" class="w-full flex items-center justify-center gap-2 text-[10px] uppercase font-black text-debt border border-debt/30 px-3 py-4 rounded-xl hover:bg-debt/10 transition">
                            Wipe Memory
                        </button>
                    </div>
                </div>

                <div class="flex-1 flex flex-col bg-[#0A0A0A] rounded-3xl border border-white/5 relative overflow-hidden">
                    <div id="chat-window" class="flex-1 overflow-y-auto p-6 space-y-6 pb-32">
                        </div>
                    
                    <div class="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-[#0A0A0A] via-[#0A0A0A] to-transparent">
                        <div class="flex items-center gap-3 bg-[#1E1E1E] rounded-full p-2 border border-white/10 focus-within:border-white/30 transition-colors shadow-2xl max-w-3xl mx-auto">
                            <input id="chat-input" type="text" onkeypress="if(event.key==='Enter')sendMessage()" placeholder="Consult Architect..." class="flex-1 bg-transparent text-sm text-white px-4 py-3 outline-none placeholder-white/30">
                            <button onclick="sendMessage()" class="bg-white text-black p-3 rounded-full hover:bg-gray-200 transition flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-analytics" class="hidden p-6">
            <div class="flex justify-center space-x-2 mb-8">
                <button id="btn-week" onclick="toggleRange('week')" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all">This Week</button>
                <button id="btn-overall" onclick="toggleRange('overall')" class="px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all">Overall</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="stat-card text-center flex flex-col justify-center">
                    <div class="text-[10px] text-white/50 font-black uppercase mb-4 tracking-widest">Total Study (Hrs)</div>
                    <div id="stat-study-hrs" class="text-5xl font-black">0.0</div>
                    <div class="w-full bg-white/10 h-2 rounded-full mt-6 overflow-hidden"><div id="study-progress-bar" class="bg-white h-full w-0 transition-all duration-1000"></div></div>
                </div>
                
                <div class="stat-card flex flex-col items-center justify-center py-8">
                    <div class="text-[10px] text-white/50 font-black uppercase mb-6 tracking-widest">Adherence</div>
                    <div class="relative flex items-center justify-center w-36 h-36">
                        <svg class="w-full h-full transform -rotate-90">
                            <circle cx="72" cy="72" r="60" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="12"></circle>
                            <circle id="adherence-circle" cx="72" cy="72" r="60" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-dasharray="377" stroke-dashoffset="377" stroke-linecap="round" class="transition-all duration-1000 ease-out drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]"></circle>
                        </svg>
                        <div id="circle-pct" class="absolute text-3xl font-black tracking-tighter">0%</div>
                    </div>
                </div>

                <div class="stat-card text-center flex flex-col justify-center">
                    <div class="text-[10px] text-white/50 font-black uppercase mb-4 tracking-widest">Time Debt (Hrs)</div>
                    <div id="stat-debt" class="text-5xl font-black text-debt">0.0</div>
                </div>
            </div>

            <div class="stat-card h-64 flex items-end justify-between px-8 pt-10 pb-4 space-x-2" id="chart-bars">
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
                <div class="w-full bg-white/10 rounded-t-lg chart-bar" style="height: 5%"></div>
            </div>
            <div class="flex justify-between px-8 mt-2 text-[10px] font-black text-white/30 uppercase">
                <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
            </div>
        </section>
    </main>

    <div id="toast-container"></div>

    <script>
        // start of version v5.8.2
        const BackendAPI = "https://routine-backend-7yn2.onrender.com";
        let AppState = { currentActivity: null, allActivities: [], timerSeconds: 0, totalSeconds: 0, timerState: 'READY', timerInterval: null, accumulated_seconds: 0 };
        let localChatHistory = JSON.parse(localStorage.getItem('routine_chat_cache')) || [];
        let lastAppliedChange = null;

        document.addEventListener('DOMContentLoaded', () => {
            fetchSchedule();
            setInterval(updateHeaderClock, 1000);
            setInterval(syncWithCloud, 5000);
            syncWithCloud();

            if(localChatHistory.length === 0) {
                appendBubble('ai', "System: Memory Loaded. Architect Engine V5.8.2 online.");
            } else {
                localChatHistory.forEach(m => appendBubble(m.type, m.text));
            }
        });

        function updateHeaderClock() {
            document.getElementById('header-live-clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function fetchSchedule() {
            try {
                const res = await fetch(`${BackendAPI}/get_schedule`);
                const d = await res.json();
                
                if (d.status === "success") {
                    AppState.allActivities = d.data;
                    AppState.currentActivity = d.cur;
                    document.getElementById('current-activity').innerText = d.cur.Activity;
                    document.getElementById('prev-activity').innerText = d.prev.Activity;
                    document.getElementById('next-activity').innerText = d.next.Activity;
                    
                    AppState.totalSeconds = Math.round((parseFloat(d.cur.Duration) || 1) * 3600);
                    if (AppState.timerState === 'READY') {
                        AppState.timerSeconds = AppState.totalSeconds;
                        updateTimerDisplay();
                    }

                    const savedStart = localStorage.getItem('routine_timer_start');
                    const savedActivity = localStorage.getItem('routine_timer_activity');
                    const savedAcc = localStorage.getItem('routine_timer_accumulated');

                    if (savedActivity === d.cur.Activity) {
                        AppState.accumulated_seconds = parseInt(savedAcc) || 0;
                        if (savedStart) {
                            AppState.timerState = 'RUNNING';
                            document.getElementById('btn-pause').innerText = "PAUSE";
                            startTimerLoop();
                        } else if (AppState.accumulated_seconds > 0) {
                            AppState.timerState = 'PAUSED';
                            document.getElementById('btn-pause').innerText = "RESUME";
                            AppState.timerSeconds = AppState.totalSeconds - AppState.accumulated_seconds;
                            updateTimerDisplay();
                        }
                    }
                } else {
                    document.getElementById('current-activity').innerText = "DB ERROR";
                }
            } catch(e) { document.getElementById('current-activity').innerText = "SERVER DOWN"; }
        }

        async function syncWithCloud() {
            try {
                const res = await fetch(`${BackendAPI}/get_state`);
                if (res.ok) {
                    const result = await res.json();
                    const cloud = result.data;
                    const indicator = document.getElementById('sync-indicator');

                    if (indicator) {
                        indicator.innerText = ""; 
                        if (cloud.state === 'RUNNING') indicator.className = "text-[8px] tracking-widest uppercase sync-active";
                        else if (cloud.state === 'PAUSED') indicator.className = "text-[8px] tracking-widest uppercase text-yellow-400";
                        else indicator.className = "text-[8px] tracking-widest uppercase text-white/20";
                    }

                    if (cloud.state === 'RUNNING' && cloud.start_time) {
                        if (AppState.timerState !== 'RUNNING') {
                            localStorage.setItem('routine_timer_start', cloud.start_time);
                            localStorage.setItem('routine_timer_activity', cloud.activity);
                            localStorage.setItem('routine_timer_accumulated', cloud.accumulated_seconds || 0);
                            AppState.accumulated_seconds = cloud.accumulated_seconds || 0;
                            AppState.timerState = 'RUNNING';
                            document.getElementById('btn-pause').innerText = "PAUSE";
                            startTimerLoop();
                        }
                    } else if (cloud.state === 'PAUSED') {
                        if (AppState.timerState !== 'PAUSED') {
                            clearInterval(AppState.timerInterval);
                            AppState.timerState = 'PAUSED';
                            AppState.accumulated_seconds = cloud.accumulated_seconds || 0;
                            localStorage.setItem('routine_timer_accumulated', AppState.accumulated_seconds);
                            localStorage.removeItem('routine_timer_start');
                            document.getElementById('btn-pause').innerText = "RESUME";
                            AppState.timerSeconds = AppState.totalSeconds - AppState.accumulated_seconds;
                            updateTimerDisplay();
                        }
                    } else if (cloud.state === 'READY' && AppState.timerState !== 'READY') {
                         clearInterval(AppState.timerInterval);
                         AppState.timerState = 'READY';
                         localStorage.removeItem('routine_timer_start');
                         localStorage.removeItem('routine_timer_activity');
                         location.reload(); 
                    }
                }
            } catch(e) {}
        }

        function updateTimerDisplay() {
            const abs = Math.max(0, AppState.timerSeconds);
            const h = Math.floor(abs/3600).toString().padStart(2,'0');
            const m = Math.floor((abs%3600)/60).toString().padStart(2,'0');
            const s = (abs%60).toString().padStart(2,'0');
            document.getElementById('main-timer').innerText = `${h}:${m}:${s}`;
        }

        function startTimerLoop() {
            if(AppState.timerInterval) clearInterval(AppState.timerInterval);
            AppState.timerInterval = setInterval(() => { 
                const savedStart = parseInt(localStorage.getItem('routine_timer_start'));
                const acc = parseInt(localStorage.getItem('routine_timer_accumulated')) || 0;
                if (savedStart) {
                    const elapsedSeconds = Math.floor((Date.now() - savedStart) / 1000);
                    AppState.timerSeconds = AppState.totalSeconds - (elapsedSeconds + acc);
                    if (AppState.timerSeconds < 0) AppState.timerSeconds = 0; 
                }
                updateTimerDisplay(); 
            }, 1000);
        }

        async function handleCheckIn() { 
            if(AppState.timerState === 'READY' && AppState.currentActivity) { 
                AppState.timerState = 'RUNNING'; 
                AppState.accumulated_seconds = 0;
                const startTime = Date.now();
                localStorage.setItem('routine_timer_start', startTime);
                localStorage.setItem('routine_timer_activity', AppState.currentActivity.Activity);
                localStorage.setItem('routine_timer_accumulated', 0);
                startTimerLoop();
                document.getElementById('btn-pause').innerText = "PAUSE";
                try {
                    await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'RUNNING', activity: AppState.currentActivity.Activity, start_time: startTime, accumulated_seconds: 0 }) });
                    syncWithCloud();
                } catch(e) {}
            } 
        }

        async function handlePauseResume() {
            if (AppState.timerState === 'READY') return;
            if (AppState.timerState === 'RUNNING') {
                clearInterval(AppState.timerInterval);
                AppState.timerState = 'PAUSED';
                const savedStart = parseInt(localStorage.getItem('routine_timer_start'));
                if (savedStart) AppState.accumulated_seconds += Math.floor((Date.now() - savedStart) / 1000);
                localStorage.setItem('routine_timer_accumulated', AppState.accumulated_seconds);
                localStorage.removeItem('routine_timer_start');
                document.getElementById('btn-pause').innerText = "RESUME";
                try { await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'PAUSED', activity: AppState.currentActivity.Activity, start_time: null, accumulated_seconds: AppState.accumulated_seconds }) }); } catch(e) {}
            } else if (AppState.timerState === 'PAUSED') {
                AppState.timerState = 'RUNNING';
                const startTime = Date.now();
                localStorage.setItem('routine_timer_start', startTime);
                document.getElementById('btn-pause').innerText = "PAUSE";
                startTimerLoop();
                try { await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'RUNNING', activity: AppState.currentActivity.Activity, start_time: startTime, accumulated_seconds: AppState.accumulated_seconds }) }); } catch(e) {}
            }
        }

        async function handleCheckOut(event) { 
            if (AppState.timerState === 'READY') return;
            clearInterval(AppState.timerInterval); 
            const workedSeconds = AppState.totalSeconds - AppState.timerSeconds;
            const actualDurationHrs = workedSeconds / 3600;
            const plannedDurationHrs = parseFloat(AppState.currentActivity.Duration);
            const timeDebt = Math.max(0, plannedDurationHrs - actualDurationHrs);
            localStorage.removeItem('routine_timer_start');
            localStorage.removeItem('routine_timer_activity');
            localStorage.removeItem('routine_timer_accumulated');
            event.target.innerText = "Saving...";
            try {
                await fetch(`${BackendAPI}/log_session`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ activity: AppState.currentActivity.Activity, planned_duration: plannedDurationHrs, actual_duration: actualDurationHrs, time_debt: timeDebt }) }); 
                await fetch(`${BackendAPI}/set_state`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ state: 'READY', activity: null, start_time: null, accumulated_seconds: 0 }) });
                location.reload(); 
            } catch(e) { event.target.innerText = "Check-Out"; }
        }

        async function sendMessage(overrideText = null) {
            const input = document.getElementById('chat-input');
            const msg = overrideText || input.value.trim();
            if(!msg) return;

            appendBubble('user', msg);
            if(!overrideText) input.value = '';

            const loadingId = "loading-" + Date.now();
            const thinkingHTML = `<div class="flex space-x-1 items-center h-5"><div class="w-1.5 h-1.5 bg-white/50 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-white/50 rounded-full typing-dot"></div><div class="w-1.5 h-1.5 bg-white/50 rounded-full typing-dot"></div></div>`;
            appendBubble('ai', thinkingHTML, loadingId);

            try {
                const res = await fetch(`${BackendAPI}/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: msg }) });
                document.getElementById(loadingId)?.remove();

                const result = await res.json();
                if(result.status === "success") {
                    const aiText = result.text;
                    localChatHistory.push({type: 'user', text: msg}, {type: 'ai', text: aiText});
                    localStorage.setItem('routine_chat_cache', JSON.stringify(localChatHistory.slice(-20)));
                    processAIResponse(aiText);
                }
            } catch(e) { document.getElementById(loadingId)?.remove(); showToast("Chat Offline", "error"); }
        }

        function appendBubble(type, text, id = null) {
            const win = document.getElementById('chat-window'), div = document.createElement('div');
            if(id) div.id = id;
            div.className = type === 'ai' ? 'chat-bubble-ai p-5 max-w-[85%] text-sm leading-relaxed self-start animate-in fade-in slide-in-from-left-2 shadow-xl' : 'chat-bubble-user p-5 max-w-[85%] text-sm leading-relaxed self-end ml-auto animate-in fade-in slide-in-from-right-2 shadow-xl';
            
            if (text.includes('typing-dot')) {
                div.innerHTML = text; 
            } else {
                div.innerHTML = text.replace(/\n/g, '<br>');
            }
            
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function clearChatHistory() {
            if(!confirm("Wipe all chat memory? This cannot be undone.")) return;
            showToast("Wiping Memory...", "info");
            try {
                const res = await fetch(`${BackendAPI}/clear_chat`, { method: 'DELETE' });
                if(res.ok) {
                    localStorage.removeItem('routine_chat_cache');
                    localChatHistory = [];
                    document.getElementById('chat-window').innerHTML = '';
                    appendBubble('ai', "Memory wiped. I am ready for a fresh start, Sriniket.");
                    showToast("Memory Cleared", "success");
                }
            } catch(e) { showToast("Wipe Failed", "error"); }
        }

        function processAIResponse(rawText) {
            let cleanText = rawText, actionData = null;
            const actionMatch = rawText.match(/ACTION_RECS:\s*({[\s\S]*?})/);
            if(actionMatch) {
                try { actionData = JSON.parse(actionMatch[1]); cleanText = rawText.replace(actionMatch[0], '').trim(); } 
                catch(e) { console.error("Failed to parse AI JSON block", e); }
            }
            appendBubble('ai', cleanText);
            if(actionData) renderActionCard(actionData);
        }

        function renderActionCard(data) {
            const win = document.getElementById('chat-window'), div = document.createElement('div');
            div.className = "stat-card border-white/20 p-6 space-y-4 max-w-[85%] animate-in zoom-in-95 self-start ml-4 mt-2 shadow-xl";
            div.innerHTML = `<span class="text-[9px] font-black text-white/30 uppercase tracking-widest">Architect Suggestion</span><h5 class="text-sm font-bold text-white">${data.action_target} ➔ ${data.new_val}</h5><p class="text-[11px] text-white/50 italic">"${data.reason}"</p><div class="flex space-x-2"><button id="btn-apply" onclick="executeAdjustment(event, '${data.action_target}', '${data.new_val}')" class="flex-1 bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase transition hover:bg-gray-200">Confirm</button><button onclick="this.parentElement.parentElement.remove()" class="px-5 py-3 border border-white/10 rounded-xl text-[10px] font-black uppercase text-white hover:bg-white/5 transition">Ignore</button></div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function executeAdjustment(e, activity, newVal) {
            const btn = e.target;
            btn.innerText = "Applying...";
            btn.disabled = true;
            const original = AppState.allActivities.find(a => a.Activity.toLowerCase() === activity.toLowerCase());
            const oldVal = original ? original.Duration : "1.0h";
            const res = await fetch(`${BackendAPI}/update_timetable`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ activity, new_val: newVal }) });
            if(res.ok) {
                lastAppliedChange = { activity, oldVal };
                showToast("Schedule Adjusted", "success");
                btn.parentElement.innerHTML = `<button onclick="revertLastChange(event)" class="flex-1 border border-debt text-debt hover:bg-debt/10 py-3 rounded-xl font-black text-[10px] uppercase transition">Revert Change</button>`;
            } else { btn.innerText = "Failed"; btn.classList.add("bg-debt", "text-white"); }
        }

        async function revertLastChange(e) {
            if(!lastAppliedChange) return;
            const btn = e.target;
            btn.innerText = "Reverting...";
            const { activity, oldVal } = lastAppliedChange;
            const res = await fetch(`${BackendAPI}/update_timetable`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ activity, new_val: oldVal }) });
            if(res.ok) {
                lastAppliedChange = null;
                btn.parentElement.parentElement.remove();
                sendMessage(`System: Reverted ${activity} to ${oldVal}.`);
                showToast("Restored", "info");
            }
        }

        async function fetchAnalytics() {
            try {
                const res = await fetch(`${BackendAPI}/get_analytics`);
                const result = await res.json();
                if (result.status === "success") { AppState.analyticsData = result; toggleRange('week'); }
            } catch (e) { showToast("Analytics Offline", "error"); }
        }

        function toggleRange(range) {
            const w = document.getElementById('btn-week'), o = document.getElementById('btn-overall');
            const data = range === 'week' ? AppState.analyticsData.week : AppState.analyticsData.overall;
            
            w.className = range === 'week' ? "px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all" : "px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all";
            o.className = range === 'overall' ? "px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all" : "px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all";
            
            if(!data) return;
            
            document.getElementById('stat-study-hrs').innerText = data.study;
            document.getElementById('stat-debt').innerText = data.debt;
            document.getElementById('study-progress-bar').style.width = Math.min(100, (data.study / 10) * 100) + "%";
            
            const offset = 377 - (377 * data.adherence) / 100;
            document.getElementById('adherence-circle').style.strokeDashoffset = offset;
            document.getElementById('circle-pct').innerText = data.adherence + "%";
            
            const maxVal = Math.max(...data.chart, 1);
            const bars = document.getElementById('chart-bars').children;
            data.chart.forEach((val, i) => {
                const height = Math.max(5, (val / maxVal) * 100);
                bars[i].style.height = height + "%";
                bars[i].className = val > 0 ? "bg-white w-full rounded-t-lg chart-bar" : "bg-white/10 w-full rounded-t-lg chart-bar";
            });
        }

        function switchTab(view) {
            ['dashboard', 'insights', 'analytics'].forEach(s => { 
                document.getElementById(`view-${s}`).classList.add('hidden'); 
                document.getElementById(`nav-${s}`).classList.replace('tab-active', 'tab-inactive'); 
            });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.replace('tab-inactive', 'tab-active');
            if(view === 'analytics') fetchAnalytics();
        }

        function showToast(m, t) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-8 py-5 rounded-3xl glass-panel border border-white/10 text-[10px] font-black uppercase tracking-widest shadow-2xl`;
            if (t === 'error') toast.style.borderColor = '#FF6B6B';
            toast.innerText = m;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
        // end of version v5.8.2
    </script>
</body>
</html>
