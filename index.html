<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Routine Flow | Architect</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='white'/><path d='M30 50 L50 20 L45 50 L70 50 L50 80 L55 50 Z' fill='black'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { obsidian: '#050505', sage: '#E8F5E9', debt: '#FF6B6B', glass: 'rgba(255,255,255,0.03)' } } }
        }
    </script>
    <style>
        body { background-color: #000000; color: #E5E7EB; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
        .glass-panel { background: rgba(30,30,30,0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-active { color: white !important; border-bottom: 2px solid white !important; }
        .tab-inactive { color: rgba(255,255,255,0.3) !important; border-bottom: 2px solid transparent !important; }
        .chat-container { height: calc(100vh - 220px); scrollbar-width: none; }
        .chat-bubble-ai { background: rgba(255,255,255,0.05); border-radius: 0 1.5rem 1.5rem 1.5rem; }
        .chat-bubble-user { background: #FFFFFF; color: #000000; border-radius: 1.5rem 1.5rem 0 1.5rem; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; padding: 1.5rem; }
        .chart-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .clock-font { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.05em; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="font-sans">

    <header class="fixed top-0 left-0 right-0 z-50 glass-panel">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-display text-xl font-900 tracking-tighter text-white uppercase italic">ROUTINE<span class="text-white/70 not-italic">FLOW</span></h1>
                <span id="header-live-clock" class="clock-font text-[10px] text-white/40 tracking-widest uppercase">00:00:00 AM</span>
            </div>
            <nav class="flex space-x-6 font-black text-[10px] tracking-[0.3em]">
                <button id="nav-dashboard" onclick="switchTab('dashboard')" class="pb-1 tab-active uppercase">DASHBOARD</button>
                <button id="nav-insights" onclick="switchTab('insights')" class="pb-1 tab-inactive uppercase">ARCHITECT</button>
                <button id="nav-analytics" onclick="switchTab('analytics')" class="pb-1 tab-inactive uppercase">ANALYTICS</button>
            </nav>
        </div>
    </header>

    <main class="pt-24 max-w-7xl mx-auto min-h-screen">
        
        <section id="view-dashboard" class="p-6 space-y-16 md:space-y-24">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center text-center">
                <div class="flex flex-col">
                    <span class="text-[10px] text-white/30 uppercase tracking-widest">Previous</span>
                    <h3 id="prev-activity" class="font-black text-white uppercase mt-1">---</h3>
                    <span id="prev-time" class="text-white/20 font-mono text-[9px]">00:00 - 00:00</span>
                </div>
                <div class="flex flex-col items-center">
                    <span id="current-activity" class="border border-white/20 px-8 py-2 rounded-full text-[10px] font-black uppercase tracking-widest bg-white/5">---</span>
                    <div class="text-3xl font-black mt-4 clock-font">
                        <span id="activity-progress">0.00h</span>
                        <span class="text-white/10 mx-1">/</span>
                        <span id="activity-total" class="text-white/40">0.00h</span>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-white/30 uppercase tracking-widest">Next</span>
                    <h3 id="next-activity" class="font-black text-white uppercase mt-1">---</h3>
                    <span id="next-time" class="text-white/20 font-mono text-[9px]">00:00 - 00:00</span>
                </div>
            </div>
            <div class="flex flex-col items-center space-y-12">
                <div id="main-timer" class="clock-font text-7xl md:text-[10rem] font-bold text-white tracking-tighter leading-none">00:00:00</div>
                <div class="flex space-x-4">
                    <button onclick="handleCheckIn()" class="bg-white text-black px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-transform">Check-In</button>
                    <button onclick="handleCheckOut(event)" class="border border-white/10 px-12 py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-white/5 active:scale-95 transition-transform">Check-Out</button>
                </div>
            </div>
        </section>

        <section id="view-insights" class="hidden flex h-[calc(100vh-120px)]">
            <div class="w-64 border-r border-white/5 p-6 flex flex-col justify-between hidden md:flex">
                <div class="space-y-6">
                    <h4 class="text-[10px] font-black text-white/30 uppercase tracking-widest">Memory Logs</h4>
                    <div id="chat-history-list" class="space-y-2">
                        <div class="p-3 bg-white/5 rounded-xl text-[9px] font-bold text-white/60 uppercase">Persistent Session</div>
                    </div>
                </div>
                <button onclick="clearChatHistory()" class="w-full py-3 border border-debt/30 text-debt/60 hover:text-debt hover:border-debt rounded-xl text-[9px] font-black uppercase tracking-widest transition-all">
                    Clear History
                </button>
            </div>
            <div class="flex-1 flex flex-col relative bg-obsidian">
                <div id="chat-window" class="chat-container overflow-y-auto p-6 space-y-6 pb-40">
                    </div>
                <div class="absolute bottom-6 left-0 right-0 px-6">
                    <div class="max-w-3xl mx-auto relative">
                        <input id="chat-input" type="text" placeholder="Consult Architect..." onkeypress="if(event.key === 'Enter') sendMessage()" class="w-full bg-white/5 border border-white/10 rounded-2xl py-5 px-6 text-sm focus:outline-none focus:border-white/20 transition-all">
                        <button onclick="sendMessage()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white text-black p-2 rounded-xl"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg></button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-analytics" class="hidden p-6 space-y-8 max-w-5xl mx-auto">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black uppercase tracking-tight text-white">Performance <span class="text-white/20">Metrics</span></h2>
                <div class="flex bg-white/5 p-1 rounded-xl">
                    <button onclick="toggleRange('week')" id="btn-week" class="px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all">Week</button>
                    <button onclick="toggleRange('overall')" id="btn-overall" class="px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all">Overall</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="stat-card flex flex-col justify-between h-40">
                    <span class="text-[9px] font-black text-white/30 uppercase tracking-widest">Total Study</span>
                    <div class="text-4xl font-black text-white"><span id="stat-study-hrs">0.0</span> <span class="text-xs text-white/20">HRS</span></div>
                    <div class="w-full bg-white/5 h-1 rounded-full"><div id="study-progress-bar" class="bg-white h-full transition-all duration-1000" style="width: 0%"></div></div>
                </div>
                <div class="stat-card flex flex-col justify-between h-40">
                    <span class="text-[9px] font-black text-white/30 uppercase tracking-widest">Adherence</span>
                    <div id="stat-adherence" class="text-4xl font-black text-white">0%</div>
                    <span class="text-[9px] text-sage/40 font-bold uppercase tracking-widest">Consistency Index</span>
                </div>
                <div class="stat-card flex flex-col justify-between h-40">
                    <span class="text-[9px] font-black text-white/30 uppercase tracking-widest text-debt">Time Debt</span>
                    <div class="text-4xl font-black text-debt"><span id="stat-debt">0.0</span> <span class="text-xs text-debt/20 tracking-widest uppercase font-black">HRS</span></div>
                    <span class="text-[9px] text-debt/40 font-bold uppercase tracking-widest">Shortfall</span>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="stat-card flex flex-col items-center justify-center space-y-6 min-h-[300px]">
                    <div class="relative w-32 h-32 flex items-center justify-center">
                        <svg class="absolute inset-0 w-full h-full -rotate-90"><circle cx="64" cy="64" r="54" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="12"/><circle id="adherence-circle" cx="64" cy="64" r="54" fill="transparent" stroke="white" stroke-width="12" stroke-dasharray="339.29" stroke-dashoffset="339.29" class="transition-all duration-1000"/></svg>
                        <span id="circle-pct" class="text-xl font-black text-white">0%</span>
                    </div>
                    <span class="text-[10px] font-black uppercase text-white/30 tracking-widest">Habit Strength</span>
                </div>
                <div class="stat-card flex flex-col justify-end p-8 space-y-6 min-h-[300px]">
                    <div id="chart-bars" class="flex items-end space-x-3 h-32">
                        <div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div><div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div><div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div><div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div><div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div><div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div><div class="bg-white/10 w-full rounded-t-lg chart-bar h-[5%]"></div>
                    </div>
                    <span class="text-[10px] font-black uppercase text-white/30 tracking-widest text-center">Weekly Load (Mon-Sun)</span>
                </div>
            </div>
        </section>
    </main>

    <div id="toast-container" class="fixed bottom-10 right-10 flex flex-col gap-4 z-[110]"></div>

    <script>
        const BackendAPI = "https://routine-backend-7yn2.onrender.com";
        let AppState = { currentActivity: null, allActivities: [], timerSeconds: 0, totalSeconds: 0, timerState: 'READY', timerInterval: null };
        let localChatHistory = JSON.parse(localStorage.getItem('routine_chat_cache')) || [];
        let lastAppliedChange = null;

        document.addEventListener('DOMContentLoaded', () => {
            fetchSchedule();
            setInterval(updateHeaderClock, 1000);
            if(localChatHistory.length === 0) {
                appendBubble('ai', "System: Memory Loaded. Architect Engine V5.5.5 online. How are you feeling today, Sriniket?");
            } else {
                localChatHistory.forEach(m => appendBubble(m.type, m.text));
            }
        });

        async function fetchSchedule() {
            try {
                const res = await fetch(`${BackendAPI}/get_schedule`);
                const result = await res.json();
                if (result.status === "success") {
                    AppState.allActivities = result.data;
                    updateDashboardUI();
                }
            } catch(e) { console.error("Sync Error"); }
        }

        function updateHeaderClock() {
            const now = new Date();
            document.getElementById('header-live-clock').innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
        }

        function updateDashboardUI() {
            if(!AppState.allActivities.length) return;
            const now = new Date();
            const curMin = (now.getHours() * 60) + now.getMinutes();
            const parse = (t) => {
                const [time, mod] = t.split(' ');
                let [h, m] = time.split(':').map(Number);
                if(h === 12) h = 0;
                return (mod === 'PM' ? h + 12 : h) * 60 + m;
            };
            let idx = AppState.allActivities.findIndex(i => {
                const [sStr, eStr] = i.Time.split('-').map(s => s.trim());
                const s = parse(sStr), e = parse(eStr);
                return e < s ? (curMin >= s || curMin < e) : (curMin >= s && curMin < e);
            });
            if(idx === -1) idx = 0;
            const cur = AppState.allActivities[idx], prev = AppState.allActivities[idx-1] || AppState.allActivities[AppState.allActivities.length-1], next = AppState.allActivities[idx+1] || AppState.allActivities[0];
            
            document.getElementById('current-activity').innerText = cur.Activity;
            document.getElementById('prev-activity').innerText = prev.Activity;
            document.getElementById('prev-time').innerText = prev.Time;
            document.getElementById('next-activity').innerText = next.Activity;
            document.getElementById('next-time').innerText = next.Time;
            
            AppState.currentActivity = cur;
            AppState.totalSeconds = Math.round((parseFloat(cur.Duration) || 1) * 3600);
            AppState.timerSeconds = AppState.totalSeconds;
            document.getElementById('activity-total').innerText = `${parseFloat(cur.Duration).toFixed(2)}h`;
            
            updateTimerDisplay();

            // --- V5.5.5: RESUME TIMER IF PAGE WAS RELOADED ---
            const savedStart = localStorage.getItem('routine_timer_start');
            const savedActivity = localStorage.getItem('routine_timer_activity');
            
            if (savedStart && savedActivity === cur.Activity) {
                AppState.timerState = 'RUNNING';
                startTimerLoop();
            }
        }

        function updateTimerDisplay() {
            const abs = Math.abs(AppState.timerSeconds);
            const h = Math.floor(abs/3600).toString().padStart(2,'0'), m = Math.floor((abs%3600)/60).toString().padStart(2,'0'), s = (abs%60).toString().padStart(2,'0');
            document.getElementById('main-timer').innerText = `${h}:${m}:${s}`;
            document.getElementById('activity-progress').innerText = `${Math.max(0, (AppState.totalSeconds - AppState.timerSeconds)/3600).toFixed(2)}h`;
        }

        // --- BULLETPROOF TIMER LOGIC ---
        function handleCheckIn() { 
            if(AppState.timerState === 'READY') { 
                AppState.timerState = 'RUNNING'; 
                
                // Save the exact start time to local storage
                localStorage.setItem('routine_timer_start', Date.now());
                localStorage.setItem('routine_timer_activity', AppState.currentActivity.Activity);
                
                startTimerLoop();
            } 
        }

        function startTimerLoop() {
            if(AppState.timerInterval) clearInterval(AppState.timerInterval);
            
            AppState.timerInterval = setInterval(() => { 
                const savedStart = parseInt(localStorage.getItem('routine_timer_start'));
                if (savedStart) {
                    const elapsedSeconds = Math.floor((Date.now() - savedStart) / 1000);
                    AppState.timerSeconds = AppState.totalSeconds - elapsedSeconds;
                    
                    if (AppState.timerSeconds < 0) AppState.timerSeconds = 0; 
                }
                updateTimerDisplay(); 
            }, 1000);
        }

        async function handleCheckOut(event) { 
            if (AppState.timerState !== 'RUNNING') return;
            clearInterval(AppState.timerInterval); 
            
            // Calculate exact duration
            const workedSeconds = AppState.totalSeconds - AppState.timerSeconds;
            const actualDurationHrs = workedSeconds / 3600;
            const plannedDurationHrs = parseFloat(AppState.currentActivity.Duration);
            const timeDebt = Math.max(0, plannedDurationHrs - actualDurationHrs);

            // Clear saved timer
            localStorage.removeItem('routine_timer_start');
            localStorage.removeItem('routine_timer_activity');

            event.target.innerText = "Saving...";

            try {
                await fetch(`${BackendAPI}/log_session`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ 
                        activity: AppState.currentActivity.Activity, 
                        planned_duration: plannedDurationHrs, 
                        actual_duration: actualDurationHrs, 
                        time_debt: timeDebt 
                    }) 
                }); 
                location.reload(); 
            } catch (e) {
                showToast("Failed to save session", "error");
                event.target.innerText = "Check-Out";
            }
        }

        // --- AI ARCHITECT LOGIC ---
        async function sendMessage(overrideText = null) {
            const input = document.getElementById('chat-input');
            const msg = overrideText || input.value.trim();
            if(!msg) return;
            
            appendBubble('user', msg);
            if(!overrideText) input.value = '';
            
            const loadingId = "loading-" + Date.now();
            appendBubble('ai', "Thinking...", loadingId);

            try {
                const res = await fetch(`${BackendAPI}/chat`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ message: msg }) });
                document.getElementById(loadingId)?.remove();
                
                const result = await res.json();
                if(result.status === "success") {
                    const aiText = result.text;
                    localChatHistory.push({type: 'user', text: msg}, {type: 'ai', text: aiText});
                    localStorage.setItem('routine_chat_cache', JSON.stringify(localChatHistory.slice(-20)));
                    processAIResponse(aiText);
                }
            } catch(e) { 
                document.getElementById(loadingId)?.remove();
                showToast("Chat Offline", "error"); 
            }
        }

        function appendBubble(type, text, id = null) {
            const win = document.getElementById('chat-window'), div = document.createElement('div');
            if(id) div.id = id;
            div.className = type === 'ai' 
                ? 'chat-bubble-ai p-5 max-w-[85%] text-sm leading-relaxed self-start animate-in fade-in slide-in-from-left-2' 
                : 'chat-bubble-user p-5 max-w-[85%] text-sm leading-relaxed self-end ml-auto animate-in fade-in slide-in-from-right-2';
            
            div.innerHTML = text.replace(/\n/g, '<br>');
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function clearChatHistory() {
            if(!confirm("Wipe all chat memory? This cannot be undone.")) return;
            showToast("Wiping Memory...", "info");
            try {
                const res = await fetch(`${BackendAPI}/clear_chat`, { method: 'DELETE' });
                if(res.ok) {
                    localStorage.removeItem('routine_chat_cache');
                    localChatHistory = [];
                    document.getElementById('chat-window').innerHTML = '';
                    appendBubble('ai', "Memory wiped. I am ready for a fresh start, Sriniket.");
                    showToast("Memory Cleared", "success");
                }
            } catch(e) { showToast("Wipe Failed", "error"); }
        }

        function processAIResponse(rawText) {
            let cleanText = rawText, actionData = null;
            
            const actionMatch = rawText.match(/ACTION_RECS:\s*({[\s\S]*?})/);
            
            if(actionMatch) {
                try { 
                    actionData = JSON.parse(actionMatch[1]); 
                    cleanText = rawText.replace(actionMatch[0], '').trim();
                } catch(e) {
                    console.error("Failed to parse AI JSON block", e);
                }
            }
            appendBubble('ai', cleanText);
            if(actionData) renderActionCard(actionData);
        }

        function renderActionCard(data) {
            const win = document.getElementById('chat-window'), div = document.createElement('div');
            div.className = "stat-card border-white/20 p-6 space-y-4 max-w-[85%] animate-in zoom-in-95 self-start ml-4 mt-2";
            div.innerHTML = `<span class="text-[9px] font-black text-white/30 uppercase tracking-widest">Architect Suggestion</span><h5 class="text-sm font-bold text-white">${data.action_target} ➔ ${data.new_val}</h5><p class="text-[11px] text-white/50 italic">"${data.reason}"</p><div class="flex space-x-2"><button id="btn-apply" onclick="executeAdjustment(event, '${data.action_target}', '${data.new_val}')" class="flex-1 bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase transition hover:bg-gray-200">Confirm</button><button onclick="this.parentElement.parentElement.remove()" class="px-5 py-3 border border-white/10 rounded-xl text-[10px] font-black uppercase text-white hover:bg-white/5 transition">Ignore</button></div>`;
            win.appendChild(div);
            win.scrollTop = win.scrollHeight;
        }

        async function executeAdjustment(e, activity, newVal) {
            const btn = e.target;
            btn.innerText = "Applying...";
            btn.disabled = true;

            const original = AppState.allActivities.find(a => a.Activity.toLowerCase() === activity.toLowerCase());
            const oldVal = original ? original.Duration : "1.0h";
            
            const res = await fetch(`${BackendAPI}/update_timetable`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ activity, new_val: newVal }) });
            if(res.ok) {
                lastAppliedChange = { activity, oldVal };
                showToast("Schedule Adjusted", "success");
                btn.parentElement.innerHTML = `<button onclick="revertLastChange(event)" class="flex-1 border border-debt text-debt hover:bg-debt/10 py-3 rounded-xl font-black text-[10px] uppercase transition">Revert Change</button>`;
            } else {
                btn.innerText = "Failed";
                btn.classList.add("bg-debt", "text-white");
            }
        }

        async function revertLastChange(e) {
            if(!lastAppliedChange) return;
            const btn = e.target;
            btn.innerText = "Reverting...";
            
            const { activity, oldVal } = lastAppliedChange;
            const res = await fetch(`${BackendAPI}/update_timetable`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ activity, new_val: oldVal }) });
            
            if(res.ok) {
                lastAppliedChange = null;
                btn.parentElement.parentElement.remove();
                sendMessage(`System: Reverted ${activity} to ${oldVal}.`);
                showToast("Restored", "info");
            }
        }

        async function fetchAnalytics() {
            try {
                const res = await fetch(`${BackendAPI}/get_analytics`);
                const result = await res.json();
                if (result.status === "success") { AppState.analyticsData = result; toggleRange('week'); }
            } catch (e) { showToast("Analytics Offline", "error"); }
        }

        function toggleRange(range) {
            const w = document.getElementById('btn-week'), o = document.getElementById('btn-overall');
            const data = range === 'week' ? AppState.analyticsData.week : AppState.analyticsData.overall;
            w.className = range === 'week' ? "px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all" : "px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all";
            o.className = range === 'overall' ? "px-4 py-2 text-[10px] font-black uppercase rounded-lg bg-white text-black transition-all" : "px-4 py-2 text-[10px] font-black uppercase text-white/30 transition-all";
            if(!data) return;
            document.getElementById('stat-study-hrs').innerText = data.study;
            document.getElementById('stat-adherence').innerText = data.adherence + "%";
            document.getElementById('stat-debt').innerText = data.debt;
            document.getElementById('study-progress-bar').style.width = Math.min(100, (data.study / 10) * 100) + "%";
            const offset = 339.29 - (339.29 * data.adherence) / 100;
            document.getElementById('adherence-circle').style.strokeDashoffset = offset;
            document.getElementById('circle-pct').innerText = data.adherence + "%";
            const maxVal = Math.max(...data.chart, 1);
            const bars = document.getElementById('chart-bars').children;
            data.chart.forEach((val, i) => {
                const height = Math.max(5, (val / maxVal) * 100);
                bars[i].style.height = height + "%";
                bars[i].className = val > 0 ? "bg-white w-full rounded-t-lg chart-bar" : "bg-white/10 w-full rounded-t-lg chart-bar";
            });
        }

        function switchTab(view) {
            ['dashboard', 'insights', 'analytics'].forEach(s => { document.getElementById(`view-${s}`).classList.add('hidden'); document.getElementById(`nav-${s}`).classList.replace('tab-active', 'tab-inactive'); });
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`nav-${view}`).classList.replace('tab-inactive', 'tab-active');
            if(view === 'analytics') fetchAnalytics();
        }

        function showToast(m, t) {
            const container = document.getElementById('toast-container'), toast = document.createElement('div');
            toast.className = `px-8 py-5 rounded-3xl glass-panel border border-white/10 text-[10px] font-black uppercase tracking-widest shadow-2xl animate-in slide-in-from-right-10`;
            toast.innerText = m;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
